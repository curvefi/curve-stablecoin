name: tests-boa

on:
  pull_request:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  EXPLORER_TOKEN: ${{ secrets.EXPLORER_TOKEN }}
  HYPOTHESIS_PROFILE: no-shrink

jobs:
  ast-grep:
    name: ast-grep
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Collect changed Python test files
        id: changed-files
        shell: bash
        run: |
          files="$(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" -- 'tests/**/*.py' | tr '\n' ' ')"
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Run ast-grep
        if: steps.changed-files.outputs.files != ''
        uses: ast-grep/action@v1
        with:
          config: sgconfig.yml
          paths: ${{ steps.changed-files.outputs.files }}

      - name: No changed Python test files
        if: steps.changed-files.outputs.files == ''
        run: echo "No changed Python test files"

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12.6
        run: uv python install 3.12.6

      - name: Install Requirements
        run: uv sync

      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files --show-diff-on-failure

  tests:
    needs: pre-commit
    name: ${{ matrix.folder }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - folder: "tests/unitary"
            runs-on: "ubuntu-latest"
          - folder: "tests/e2e"
            runs-on: "ubuntu-latest"
          - folder: "tests/integration"
            runs-on: "ubuntu-latest"
          # - folder: "tests/stateful" not ready yet
          #   runs-on: "ubuntu-latest"
          # Old tests to be migrated
          - folder: "tests/flashloan"
            runs-on: "ubuntu-latest"
          - folder: "tests/controller"
            runs-on: "ubuntu-latest"
          - folder: "tests/price_oracles"
            runs-on: "ubuntu-latest"
          - folder: "tests/zaps"
            runs-on: "ubuntu-latest"
          - folder: "tests/amm"
            runs-on: "ubuntu-latest"
          - folder: "tests/lending"
            runs-on: "ubuntu-latest"
          - folder: "tests/stableborrow --ignore=tests/stableborrow/stabilize"
            runs-on: "ubuntu-latest"
          - folder: "tests/forked/mint_factory_new_implementations"
            runs-on: "ubuntu-latest"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6.7
        with:
          enable-cache: true  # Enables built-in caching for uv

      - name: Cache Compiler Installations
        uses: actions/cache@v3
        with:
          path: |
            ~/.vvm
          key: compiler-cache-${{ hashFiles('**/uv.lock') }}

      - name: Set up Python 3.12.6
        run: uv python install 3.12.6

      - name: Install Requirements
        run: uv sync

      - name: Run tests
        run: |
          uv run pytest ${{ matrix.folder }} -n auto
